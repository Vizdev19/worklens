# Alembic config for the Employee Monitor backend.
#
# The runtime DB URL is NOT set here — env.py pulls it from
# app.config.get_settings().database_url so we always migrate against
# whatever DATABASE_URL the FastAPI app is configured to talk to. That
# keeps prod / dev / CI from accidentally diverging because someone
# forgot to update alembic.ini.
#
# Run from inside backend/:
#     alembic upgrade head            # apply all pending migrations
#     alembic revision --autogenerate -m "Add foo"
#     alembic stamp head              # mark prod as at the latest rev WITHOUT running anything
#     alembic current                 # what rev is the DB at right now
#     alembic history                 # all revisions
#
# scripts/init_db.py wraps `alembic upgrade head` so existing tooling
# (CI bring-up, local dev) keeps working with the old command.

[alembic]
script_location = migrations

# Sortable revision filenames so `ls versions/` reads chronologically.
# Revision IDs themselves stay the auto-generated hash (or stable
# YYYYMMDD_NNNN if we set revision_id explicitly).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# UTC so day-rollovers around midnight don't reorder files unexpectedly
# in mixed-timezone teams.
timezone = UTC

# Where Alembic stores its own version table. The default ("alembic_version")
# in the public schema is fine for us.
# version_table = alembic_version
# version_table_schema = public

prepend_sys_path = .
sqlalchemy.url = will-be-overridden-in-env.py

[post_write_hooks]
# No code formatters wired up for v1. Add black / ruff here later if we
# want autogenerated migrations to be auto-formatted on creation.

# Logging — Alembic's default is fine; we only quiet the SQLAlchemy
# echo logger to avoid drowning real migration output in introspection
# queries.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
