name: Build Agent

on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:        # allow manual builds from GitHub UI

permissions:
  contents: write           # so we can create releases

jobs:
  # ── macOS build ─────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-14       # Apple Silicon runner (arm64)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build .app and .dmg
        working-directory: agent
        run: ./build.sh

      - name: Rename artifact for upload
        working-directory: agent/dist
        run: |
          # PyInstaller emits EmployeeMonitor-1.0.0.dmg already
          ls -lh
          cp EmployeeMonitor-1.0.0.dmg EmployeeMonitor-mac-arm64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: EmployeeMonitor-mac-arm64
          path: agent/dist/EmployeeMonitor-mac-arm64.dmg

  # ── Windows build ───────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: agent
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build .exe
        working-directory: agent
        shell: pwsh
        run: |
          python -m PyInstaller EmployeeMonitor.spec --clean --noconfirm
          if (-not (Test-Path "dist\EmployeeMonitor\EmployeeMonitor.exe")) {
            throw "Build failed: EmployeeMonitor.exe not produced"
          }

      - name: Package as ZIP (portable)
        working-directory: agent/dist
        shell: pwsh
        run: |
          Compress-Archive -Path EmployeeMonitor -DestinationPath EmployeeMonitor-windows.zip
          Get-Item EmployeeMonitor-windows.zip | Select-Object Length, Name

      - uses: actions/upload-artifact@v4
        with:
          name: EmployeeMonitor-windows
          path: agent/dist/EmployeeMonitor-windows.zip

  # ── Publish a release with both artifacts ──────────────────────────────
  release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/agent-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: ls -lhR artifacts

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#agent-v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Employee Monitor Agent v${{ steps.tag.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/EmployeeMonitor-mac-arm64/EmployeeMonitor-mac-arm64.dmg
            artifacts/EmployeeMonitor-windows/EmployeeMonitor-windows.zip
