# Agent release pipeline.
#
# What this does:
#   1. Validate that the git tag matches agent/config.py's __version__.
#   2. Build the Go launcher (single Linux runner cross-compiles all
#      four OS/arch combos).
#   3. Build the PyInstaller agent on each native runner (matrix:
#      macos-14 arm64, macos-13 amd64, windows-2022, ubuntu-22.04).
#   4. Upload every artifact to a GitHub Release named after the tag.
#   5. Assemble + POST the manifest to the backend so deployed 1.2.0+
#      agents see the new version on their next /agent/version poll.
#
# Triggers:
#   - Push of a tag matching agent-v* (production releases).
#   - Manual workflow_dispatch for re-running after a partial failure.
#
# Required secrets (only for the publish step — both can be omitted and
# the workflow still uploads release assets, just skips the manifest POST):
#   API_URL             — backend base URL (e.g. https://api.example.com)
#   AGENT_RELEASE_KEY   — bearer key compared against settings.agent_release_key
#
# Permissions:
#   contents:write — required to create the GitHub Release.

name: Agent release

on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without agent-v prefix, e.g. 1.2.0)'
        required: true

jobs:
  # ── 1. Resolve + validate the version ─────────────────────────────────────
  # Cheap pre-flight: refuses to proceed unless the tag matches
  # agent/config.py's __version__. Drift here is the most common source
  # of "version field says 1.2.0 but the binary is 1.1.9" bugs in
  # auto-update systems; we fail fast.
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      min_supported: ${{ steps.v.outputs.min_supported }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve and validate version
        id: v
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
            TAG="agent-v$V"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            V="${TAG#agent-v}"
          fi
          # Single source of truth for the embedded version.
          FILE_V=$(python3 -c "
          import re, pathlib
          m = re.search(r'__version__\s*=\s*[\"\\']([^\"\\']+)', pathlib.Path('agent/config.py').read_text())
          print(m.group(1))
          ")
          if [ "$V" != "$FILE_V" ]; then
            echo "::error::Tag version '$V' does not match agent/config.py __version__='$FILE_V'."
            echo "::error::Bump AGENT_VERSION in agent/config.py before tagging, or fix the tag."
            exit 1
          fi
          MIN=$(tr -d '[:space:]' < agent/MIN_SUPPORTED)
          if [ -z "$MIN" ]; then
            echo "::error::agent/MIN_SUPPORTED is empty"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "min_supported=$MIN" >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$V tag=$TAG min_supported=$MIN"

  # ── 2. Cross-compile the Go launcher ──────────────────────────────────────
  # Single ubuntu runner produces all four launcher binaries.
  # The launcher rarely changes; this job is fast (<1 min).
  build-launcher:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          # No dep cache: launcher uses stdlib only, no go.sum exists.

      - name: Run launcher tests
        working-directory: launcher
        run: go test ./...

      - name: Cross-compile launcher (all targets)
        working-directory: launcher
        run: ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: launcher-binaries
          path: launcher/dist/EmployeeMonitor-*
          if-no-files-found: error

  # ── 3. Build the agent PyInstaller bundle ─────────────────────────────────
  # Native per-platform build via PyInstaller. fail-fast: false so a
  # single platform failure surfaces the issue on the others too rather
  # than hiding it behind the first error.
  build-agent:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            platform: darwin-arm64
            archive_ext: tar.gz
          - runner: macos-13
            platform: darwin-amd64
            archive_ext: tar.gz
          - runner: windows-2022
            platform: windows-amd64
            archive_ext: zip
          - runner: ubuntu-22.04
            platform: linux-amd64
            archive_ext: tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: agent/requirements.txt

      - name: Install agent build deps
        working-directory: agent
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # build.sh is the same script developers run locally — keeping
      # one path means we can't regress CI's output relative to local
      # without also breaking developer builds.
      - name: Build agent
        working-directory: agent
        shell: bash
        run: ./build.sh

      - name: Compute manifest fragment
        working-directory: agent
        shell: bash
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
          EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail
          ARCHIVE="dist/EmployeeMonitorAgent-${VERSION}-${PLATFORM}.${EXT}"
          if [ ! -f "$ARCHIVE" ]; then
            echo "::error::Expected archive missing: $ARCHIVE"
            ls -la dist/ || true
            exit 1
          fi
          # Use shasum on macOS, sha256sum on Linux; git-bash on Windows
          # has shasum (perl) too.
          if command -v sha256sum >/dev/null; then
            SHA=$(sha256sum "$ARCHIVE" | awk '{print $1}')
          else
            SHA=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')
          fi
          SIZE=$(wc -c < "$ARCHIVE" | tr -d ' ')
          mkdir -p fragment
          python -c "
          import json
          json.dump({
              '${PLATFORM}': {
                  'filename': 'EmployeeMonitorAgent-${VERSION}-${PLATFORM}.${EXT}',
                  'sha256': '$SHA',
                  'size': $SIZE,
              }
          }, open('fragment/${PLATFORM}.json', 'w'), indent=2)
          "
          echo "Fragment:"
          cat "fragment/${PLATFORM}.json"

      # upload-artifact@v4 preserves directory structure relative to the
      # workspace root, so a raw upload would put files at
      # `artifacts/agent-<p>/agent/dist/…` after download. Stage them
      # into a flat dir first so the release job can find them at a
      # predictable path.
      - name: Stage artifact contents
        working-directory: agent
        shell: bash
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
          EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail
          mkdir -p _artifact
          cp "dist/EmployeeMonitorAgent-${VERSION}-${PLATFORM}.${EXT}" _artifact/
          cp "fragment/${PLATFORM}.json" _artifact/
          ls -la _artifact/

      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.platform }}
          path: agent/_artifact/*
          if-no-files-found: error

  # ── 4. Cut the GitHub Release + publish manifest ──────────────────────────
  # Waits on every build. If any matrix entry failed we don't release —
  # a partial release would have a manifest claiming platforms that
  # don't exist in the assets.
  release:
    needs: [resolve-version, build-launcher, build-agent]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Stage release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release/
          # Launcher binaries (4 files: mac arm/amd, win, linux). The
          # launcher upload was unflattened (no fragments to interleave)
          # so its artifact lays out files at the artifact root directly.
          cp artifacts/launcher-binaries/EmployeeMonitor-* release/
          # Agent archives — each platform artifact has a flat layout
          # containing the archive + its fragment.json.
          for p in artifacts/agent-*/EmployeeMonitorAgent-*; do
            cp "$p" release/
          done
          echo "Release files:"
          ls -la release/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve-version.outputs.tag }}
          VERSION: ${{ needs.resolve-version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          # Idempotent: if the release already exists (re-run), upload
          # the assets with --clobber instead of failing.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading assets with --clobber"
            gh release upload "$TAG" release/* --clobber
          else
            gh release create "$TAG" \
              --title "Agent $VERSION" \
              --notes "Automated release from .github/workflows/agent-release.yml.

          Includes the Go launcher (all platforms) and the agent payload
          for darwin-arm64, darwin-amd64, windows-amd64, linux-amd64." \
              release/*
          fi

      - name: Assemble and publish manifest
        env:
          VERSION:           ${{ needs.resolve-version.outputs.version }}
          TAG:               ${{ needs.resolve-version.outputs.tag }}
          REPO:              ${{ github.repository }}
          MIN_SUPPORTED:     ${{ needs.resolve-version.outputs.min_supported }}
          API_URL:           ${{ secrets.API_URL }}
          AGENT_RELEASE_KEY: ${{ secrets.AGENT_RELEASE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/publish_manifest.py \
            artifacts/agent-darwin-arm64/darwin-arm64.json \
            artifacts/agent-darwin-amd64/darwin-amd64.json \
            artifacts/agent-windows-amd64/windows-amd64.json \
            artifacts/agent-linux-amd64/linux-amd64.json
